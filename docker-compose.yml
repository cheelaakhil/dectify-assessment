version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dectify-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dectify-backend
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=change_this_in_production
      - DATABASE_URL=sqlite+aiosqlite:///./spacetoday.db
      - NASA_API_KEY=DEMO_KEY
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend-data:/app/data
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dectify-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
