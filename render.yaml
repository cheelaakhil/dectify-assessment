services:
  - type: web
    name: dectify-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: JWT_SECRET
        generateValue: true
      - key: NASA_API_KEY
        value: DEMO_KEY
